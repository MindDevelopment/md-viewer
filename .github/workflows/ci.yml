name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mdviewer
          POSTGRES_PASSWORD: test
          POSTGRES_DB: mdviewer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check

      - run: npm test
        env:
          DB_USER: mdviewer
          DB_PASSWORD: test
          DB_NAME: mdviewer_test
          DB_HOST: localhost
          DB_PORT: 5432
          SESSION_SECRET: ci-test-secret
    timeout-minutes: 10
